steps:
  # Build API Gateway service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'asia-southeast1-docker.pkg.dev/project-3a90e7bd-fcfe-474a-a03/microservices/api-gateway:latest',
        '-f',
        'apps/api-gateway/Dockerfile',
        '.'
      ]
    env:
      - 'ENV_FILE=apps/api-gateway/.env'
      
images:
  - 'asia-southeast1-docker.pkg.dev/project-3a90e7bd-fcfe-474a-a03/microservices/api-gateway:latest'
