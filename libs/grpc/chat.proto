syntax = "proto3";

package chat;

import "google/protobuf/struct.proto";
// 

service ChatService {
  rpc CreateRoom(CreateRoomRequest) returns (CreateRoomResponse);
}

// Requests and Responses
message CreateRoomRequest {
  string userId = 1;
  string name = 2;
  string avatar = 3;
  string type = 4;
  repeated string memberIds = 5;
}

message CreateRoomResponse {
  string message = 1;
  int32 statusCode = 2;
  string reasonStatusCode = 3;
  RoomResponse metadata = 4;
}

message RoomResponse {
  string id = 1;
  string room_id = 2;
  string name = 3;
  string avatar = 4;
  string type = 5;
  repeated members members = 6;
  string lastMessage = 7;
}

message members {
  string user_id = 1;
  string role = 2;
  string joinedAt = 3;
  string name = 4;
  string id = 5;
  
}
