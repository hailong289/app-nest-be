syntax = "proto3";

package auth;

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc SendOtp(SendOtpRequest) returns (SendOtpResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc UpdatePassword(UpdatePasswordRequest) returns (UpdatePasswordResponse);
  rpc VerifyOtp(VerifyOtpRequest) returns (VerifyOtpResponse);
  rpc ForgotPassword(ForgotPasswordRequest) returns (ForgotPasswordResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);
  rpc UpdateAvatar(UpdateAvatarRequest) returns (UpdateAvatarResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
  rpc SearchUser(SearchUserRequest) returns (SearchUserResponse);
  rpc RefreshToken(RefreshRequest) returns (RefreshResponse);
  // Device-session management for the "Quản lý thiết bị" settings page.
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc LogoutDevice(LogoutDeviceRequest) returns (LogoutResponse);
  rpc LogoutAllDevices(LogoutAllDevicesRequest) returns (LogoutResponse);
  rpc GetFcmTokens(GetFcmTokensRequest) returns (GetFcmTokensResponse);
  rpc ResolveBusinessIds(ResolveBusinessIdsRequest) returns (ResolveBusinessIdsResponse);
  rpc GetUsersBatch(GetUsersBatchRequest) returns (GetUsersBatchResponse);
}

// Geo location (best-effort, populated by api-gateway via geoip-lite).
// All fields optional: lookup may fail for private IPs / unmapped ranges.
message DeviceLocation {
  string country     = 1; // ISO-3166-1 alpha-2: 'VN', 'US'
  string region      = 2; // 'Hồ Chí Minh', 'California'
  string city        = 3;
  double lat         = 4;
  double lng         = 5;
  string timezone    = 6; // 'Asia/Ho_Chi_Minh'
}

message LoginRequest {
  string         username  = 1;
  string         password  = 2;
  string         fcmToken  = 3; // Thêm trường fcmToken
  // Device-origin fields populated by gateway from headers + geoip-lite.
  // All optional — auth.service tolerates missing values for backward
  // compat with older callers (e.g. internal tests).
  string         ip        = 4;
  string         userAgent = 5;
  DeviceLocation location  = 6;
}

message LoginResponse {
  string        message          = 1;
  int32         statusCode       = 2;
  string        reasonStatusCode = 3;
  LoginMetadata metadata         = 4;
}
message RefreshResponse {
  string        message          = 1;
  int32         statusCode       = 2;
  string        reasonStatusCode = 3;
  LoginMetadata metadata         = 4;
}

message RegisterRequest {
  string         fullname             = 1;
  string         email                = 2;
  string         phone                = 3;
  string         password             = 4;
  string         type                 = 5;
  string         gender               = 6;
  string         dateOfBirth          = 7;
  string         fcmToken             = 8;
  // Device-origin fields — same as LoginRequest, see comments there.
  string         ip                   = 9;
  string         userAgent            = 10;
  DeviceLocation location             = 11;
  string         tempRegisterToken    = 12;
}

message SendOtpRequest {
  string email = 1;
  string type  = 2;
}

message SendOtpResponse {
  string message          = 1;
  int32  statusCode       = 2;
  string reasonStatusCode = 3;
}

message RegisterResponse {
  string           message          = 1;
  int32            statusCode       = 2;
  string           reasonStatusCode = 3;
  RegisterMetadata metadata         = 4;
}

message LogoutRequest {
  string jti      = 1;
  string userId   = 2;
  // clientId from the access token — scopes Keys cleanup to JUST this
  // device. Without it, logout-all-devices would be the only option.
  string clientId = 3;
  string fcmToken = 4;
}
message RefreshRequest {
  string         jti       = 1;
  string         userId    = 2;
  // Update Keys.tkn_lastSeen* + tkn_location on every refresh — lets us
  // show "active sessions" + detect session-stealing (refresh from a
  // wildly different country than original login).
  string         ip        = 3;
  string         userAgent = 4;
  DeviceLocation location  = 5;
  // clientId from the OLD refresh token — auth.service preserves it in
  // the new token pair so device identity persists across rotations.
  string         clientId  = 6;
}
message LogoutResponse {
  string         message          = 1;
  int32          statusCode       = 2;
  string         reasonStatusCode = 3;
  LogoutMetadata metadata         = 4;
}

message GetUserRequest {
  string userId = 1;
}

message GetUserResponse {
  string          message          = 1;
  int32           statusCode       = 2;
  string          reasonStatusCode = 3;
  GetUserMetadata metadata         = 4;
}

// Metadata messages
message LoginMetadata {
  string accessToken  = 1;
  string refreshToken = 2;
  int32  expiresIn    = 3;
  User   user         = 4;
}

message RegisterMetadata {
  string accessToken  = 1;
  string refreshToken = 2;
  int32  expiresIn    = 3;
  User   user         = 4;
}

message RefreshTokenRequest {
  string refreshToken = 1;
}

message RefreshTokenResponse {
  string        message          = 1;
  int32         statusCode       = 2;
  string        reasonStatusCode = 3;
  LoginMetadata metadata         = 4;
}

message ForgotPasswordRequest {
  string email    = 1;
  string username = 2;
  bool   isMobile = 3; // Mặc định là false nếu không gửi
}

message ForgotPasswordResponse {
  string           message          = 1;
  int32            statusCode       = 2;
  string           reasonStatusCode = 3;
  RegisterMetadata metadata         = 4;
}

message LogoutMetadata {
  // Empty for now, can add fields if needed
}

// ── Device-session management ──────────────────────────────────────
// Backs the "Quản lý thiết bị" settings page. ListSessions returns
// every Keys row for the user (active + history). LogoutDevice /
// LogoutAllDevices soft-revoke without hard-deleting so the row stays
// as an audit-trail entry.

message ListSessionsRequest {
  string userId          = 1;
  // clientId of the requesting browser — auth.service marks the matching
  // session as `isCurrent: true` so the FE can disable its own
  // "logout this device" button (suicide → stuck UI).
  string currentClientId = 2;
}

// Geo location duplicated here to avoid forcing the FE through the
// Mongoose-flavoured TknLocation. Mirrors `DeviceLocation` above.
message DeviceSessionInfo {
  string clientId      = 1;
  string ip            = 2;
  string userAgent     = 3;
  string lastSeenAt    = 4;
  string lastSeenIp    = 5;
  string revokedAt     = 6;
  string revokedReason = 7;
  string createdAt     = 8;
  bool   isCurrent     = 9;
  // Inline location (subset). Empty strings when GeoIP couldn't resolve
  // (private IP, unmapped range).
  string country       = 10;
  string region        = 11;
  string city          = 12;
  string timezone      = 13;
  // Parsed UA — nullable on the wire via empty-string sentinel because
  // proto3 has no native null. FE treats "" as missing.
  string browser       = 14;
  string os            = 15;
  string deviceType    = 16;
}

message ListSessionsResponse {
  string                     message          = 1;
  int32                      statusCode       = 2;
  string                     reasonStatusCode = 3;
  repeated DeviceSessionInfo metadata         = 4;
}

message LogoutDeviceRequest {
  string userId   = 1;
  string clientId = 2;
}

message LogoutAllDevicesRequest {
  string userId = 1;
}

message GetFcmTokensRequest {
  repeated string userIds = 1;
}

message UserFcmTokens {
  string userId = 1;
  repeated string fcmTokens = 2;
}

message GetFcmTokensMetadata {
  repeated UserFcmTokens items = 1;
}

message GetFcmTokensResponse {
  string               message          = 1;
  int32                statusCode       = 2;
  string               reasonStatusCode = 3;
  GetFcmTokensMetadata metadata         = 4;
}

message ResolveBusinessIdsRequest {
  repeated string usrIds = 1;
}

message BusinessUserMapping {
  string usrId = 1;
  string userId = 2;
  string _id = 3;
  string usr_id = 4;
  string id = 5;
  string name = 6;
  string fullname = 7;
  string email = 8;
  string avatar = 9;
  string status = 10;
  string slug = 11;
  string phone = 12;
}

message ResolveBusinessIdsMetadata {
  repeated BusinessUserMapping items = 1;
}

message ResolveBusinessIdsResponse {
  string                     message          = 1;
  int32                      statusCode       = 2;
  string                     reasonStatusCode = 3;
  ResolveBusinessIdsMetadata metadata         = 4;
}

message GetUsersBatchRequest {
  repeated string userIds = 1;
  string search = 2;
}

message UserSummary {
  string _id      = 1;
  string userId   = 2;
  string usr_id   = 3;
  string id       = 4;
  string name     = 5;
  string fullname = 6;
  string email    = 7;
  string avatar   = 8;
  string status   = 9;
  string slug     = 10;
  string phone    = 11;
}

message GetUsersBatchMetadata {
  repeated UserSummary items = 1;
}

message GetUsersBatchResponse {
  string                message          = 1;
  int32                 statusCode       = 2;
  string                reasonStatusCode = 3;
  GetUsersBatchMetadata metadata         = 4;
}

message GetUserMetadata {
  User user = 1;
}

message User {
  string _id         = 1;
  string id          = 2;
  string fullname    = 3;
  string slug        = 4;
  string email       = 5;
  string phone       = 6;
  string avatar      = 7;
  string gender      = 8;
  string dateOfBirth = 9;
  string createdAt   = 10;
  string updatedAt   = 11;
  string address     = 12;
}

message VerifyOtpRequest {
  string indicator = 1;
  string otp       = 2;
  string type      = 3;
}

message VerifyOtpMetadata {
  string tempRegisterToken = 1;
  string accessToken       = 2;
}

message VerifyOtpResponse {
  string             message          = 1;
  int32              statusCode       = 2;
  string             reasonStatusCode = 3;
  VerifyOtpMetadata  metadata         = 4;
}

message UpdatePasswordRequest {
  string oldPassword = 1; // Có thể gửi hoặc không
  string newPassword = 2;
  string userId      = 3; // ID người dùng cần thay đổi mật khẩu
}

message UpdatePasswordResponse {
  string           message          = 1;
  int32            statusCode       = 2;
  string           reasonStatusCode = 3;
  RegisterMetadata metadata         = 4;
}


message ResetPasswordRequest {
  string userId      = 1; // ID người dùng cần thay đổi mật khẩu
  string newPassword = 2;
}

message ResetPasswordResponse {
  string           message          = 1;
  int32            statusCode       = 2;
  string           reasonStatusCode = 3;
  RegisterMetadata metadata         = 4;
}

message FileRequest {
  // FileRequest is the same as the FileRequest in the filesystem.proto
  string originalname = 1;
  bytes  buffer       = 2;
  string mimetype     = 3;
}

message UpdateAvatarRequest {
  string avatarUrl = 1;
  string userId    = 2;
}

message UpdateAvatarResponse {
  string         message          = 1;
  int32          statusCode       = 2;
  string         reasonStatusCode = 3;
  AvatarMetadata metadata         = 4;
}

message AvatarMetadata {
  string url      = 1;
  string key      = 2;
  string bucket   = 3;
  string location = 4;
}

message UpdateProfileRequest {
  string userId      = 1;
  string fullname    = 2;
  string gender      = 3;
  string dateOfBirth = 4;
  string address     = 5;
}

message UpdateProfileResponse {
  string message          = 1;
  int32  statusCode       = 2;
  string reasonStatusCode = 3;
  User   metadata         = 4;
}

message SearchUserRequest {
  string keyword = 1;
  int32  page    = 2;
  int32  limit   = 3;
  string excludeUsrId = 4;
  repeated string excludeUserIds = 5;
}

message SearchUserMetadata {
  repeated UserSummary users = 1;
  int32 total = 2;
  int32 totalPage = 3;
  int32 page = 4;
  int32 limit = 5;
}

message SearchUserResponse {
  string             message          = 1;
  int32              statusCode       = 2;
  string             reasonStatusCode = 3;
  SearchUserMetadata metadata         = 4;
}
