syntax = "proto3";

package ai;
import "quizz.proto";
import "flashcard.proto";
import "todo.proto";

service AIService {
  rpc Moderation(ModerationRequest) returns (ModerationResponse);
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc SuggestReplies(SuggestRepliesRequest) returns (SuggestRepliesResponse);
  rpc SearchMessages(SearchMessagesRequest) returns (SearchMessagesResponse);
  rpc SummaryDocument(SummaryDocumentRequest) returns (SummaryDocumentResponse);
  rpc Translation(TranslationRequest) returns (TranslationResponse);
  rpc Quizz(QuizzRequest) returns (QuizzResponse);
  rpc GenerateFlashcard(GenerateFlashcardRequest) returns (GenerateFlashcardResponse);
  
  // Streaming Endpoints
  rpc SummaryDocumentStream(SummaryDocumentRequest) returns (stream AiStreamResponse);
  rpc QuizzStream(QuizzRequest) returns (stream AiStreamResponse);
  rpc GenerateFlashcardStream(GenerateFlashcardRequest) returns (stream AiStreamResponse);
  rpc TranscribeAttachment(TranscribeAttachmentRequest) returns (TranscribeAttachmentResponse);
  rpc TranscribeRealtime(TranscribeRealtimeRequest) returns (TranscribeRealtimeResponse);

  // ───────────── Admin / Reporting ────────────────────────────────────
  rpc GetUsageReport(UsageReportRequest) returns (UsageReportResponse);
}

message UsageReportRequest {
  optional string service = 1;   // lọc theo service (moderation, translation, ...)
  optional string userId = 2;    // lọc theo user
  optional string from = 3;      // ngày bắt đầu (ISO string)
  optional string to = 4;        // ngày kết thúc (ISO string)
  string groupBy = 5;            // 'service' | 'userId' | 'day'
}

message UsageReportItem {
  string group = 1;              // giá trị nhóm (tên service / userId / ngày)
  int32 totalCalls = 2;
  int32 successCalls = 3;
  int32 errorCalls = 4;
  int32 totalTokenInput = 5;
  int32 totalTokenOutput = 6;
  double totalCostUsd = 7;
  double avgLatencyMs = 8;
  int32 uniqueUserCount = 9;
}

message UsageReportResponse {
  string groupBy = 1;
  int32 total = 2;
  repeated UsageReportItem items = 3;
}

message AiStreamResponse {
  string chunk = 1;
}

message FileRequest {
    string originalname = 1;
    bytes buffer = 2;
    string mimetype = 3;
    string fieldname=4;
    string encoding=5;
    int64 size=6;
}

message ModerationRequest {
    string text = 1;
    string userId = 2;
}

message ModerationResponse {
    string message = 1;
    int32 statusCode = 2;
    string reasonStatusCode = 3;
    ModerationMetadata metadata = 4;
}


message ModerationMetadata {
  // any
}

message SearchRequest {
  string query = 1;
  string userId = 2;
  int32 limit = 3;
  string roomId = 4;
}

message SearchResponse {
  repeated SearchResult results = 1;
}

message SearchResult {
  string text = 1;
  string contextId = 2;
  double score = 3;
  string messageId = 4;
  // Phạm vi (scope) của kết quả: 'room' = tin nhắn, 'file' = tệp, 'doc' = tài liệu.
  string contextType = 5;
}

message SuggestRepliesRequest {
  repeated string contextMessages = 1; // List of last N messages
  string userId = 2;
}

message SuggestRepliesResponse {
  repeated string suggestions = 1;
  repeated string emojis = 2;
  repeated string gif_keywords = 3;
}

message SearchMessagesRequest {
  string text = 1;
  string roomId = 2;
  int32 limit = 3;
  string userId = 4;
}

message SearchMessagesResponse {
  repeated SearchResult results = 1;
}

message SummaryDocumentRequest {
  string type = 1;
  FileRequest file = 2;
  string file_url = 3;
  optional string model = 4;
  string userId = 5;
}

message SummaryDocumentResponse {
  string message = 1;
  int32 statusCode = 2;
  string reasonStatusCode = 3;
  string metadata = 4;
}

message TranslationRequest {
  string text = 1;
  string from = 2;
  string to = 3;
  optional string model = 4;
  string userId = 5;
}

message TranslationResponse {
  string message = 1;
  int32 statusCode = 2;
  string reasonStatusCode = 3;
  string metadata = 4;
}

message QuizzRequest {
  FileRequest file = 1;
  string text = 2;
  string type = 3; // text, document
  string question_type = 4; // single_choice, multiple_choice, true_false, text
  int32 question_max = 5;
  int32 question_max_points = 6;
  optional string model = 7;
  string userId = 8;
}

message QuizzResponse {
  string message = 1;
  int32 statusCode = 2;
  string reasonStatusCode = 3;
  QuizzMetadata metadata = 4;
}

message QuizzMetadata {
  string quiz_title = 1;
  string quiz_description = 2;
  string quiz_status = 3; // draft, active, completed, cancelled
  repeated QuizzQuestion quiz_questions = 4;
}

message QuizzQuestion {
  string question_text = 1;
  string question_type = 2; // single_choice, multiple_choice, true_false, text
  int32 points = 3;
  int32 order = 4;
  string explanation = 5;
  repeated QuizzAnswer answers = 6;
}

message QuizzAnswer {
  string answer_text = 1;
  bool is_correct = 2;
  int32 points = 3;
}

message GenerateFlashcardRequest {
  string topic = 1;
  string type = 2; // text, document, file_url
  int32 card_count = 3;
  int32 difficulty = 4;
  string language = 5;
  FileRequest file = 6;
  string file_url = 7;
  optional string model = 8;
  string userId = 9;
}

message GeneratedFlashcard {
  string card_front = 1;
  string card_back = 2;
  string card_hint = 3;
  repeated string card_tags = 4;
  int32 card_difficulty = 5;
}

message GenerateFlashcardMetadata {
  string deck_name = 1;
  string deck_description = 2;
  string deck_level = 3;
  string deck_language = 4;
  repeated string deck_tags = 5;
  repeated GeneratedFlashcard flashcards = 6;
}

message GenerateFlashcardResponse {
  string message = 1;
  int32 statusCode = 2;
  string reasonStatusCode = 3;
  GenerateFlashcardMetadata metadata = 4;
}

// ───────────── Speech-to-Text on existing voice attachment ─────────────
// Audio file is already in S3 (uploaded as part of a voice message),
// so the FE only needs to send the IDs. AI service streams the audio
// from S3 into Gemini, persists the transcript on the Attachment, and
// returns it.
message TranscribeAttachmentRequest {
  string attachmentId = 1;
  string messageId = 2;
  string language = 3; // 'vi' | 'en'
  string userId = 4;
}

message TranscribeAttachmentResponse {
  string message = 1;
  int32 statusCode = 2;
  string reasonStatusCode = 3;
  TranscribeAttachmentMetadata metadata = 4;
}

message TranscribeAttachmentMetadata {
  string transcript = 1;
  string detectedLanguage = 2;
  string attachmentId = 3;
  string messageId = 4;
  bool cached = 5; // true if returned existing transcript without re-running AI
}

// ───────────── Real-time Speech-to-Text during calls ─────────────
message TranscribeRealtimeRequest {
  bytes audioChunk = 1;
  string mimeType = 2;
  string language = 3; // 'vi' | 'en'
  string userId = 4;
  string speakerName = 5;
}

message TranscribeRealtimeResponse {
  string message = 1;
  int32 statusCode = 2;
  string reasonStatusCode = 3;
  TranscribeRealtimeMetadata metadata = 4;
}

message TranscribeRealtimeMetadata {
  string transcript = 1;
  string detectedLanguage = 2;
  string speakerName = 3;
  bool isEmpty = 4;
}
