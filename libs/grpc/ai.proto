syntax = "proto3";

package ai;
import "quizz.proto";
import "flashcard.proto";
import "todo.proto";

service AIService {
  rpc Moderation(ModerationRequest) returns (ModerationResponse);
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc SuggestReplies(SuggestRepliesRequest) returns (SuggestRepliesResponse);
  rpc SearchMessages(SearchMessagesRequest) returns (SearchMessagesResponse);
  rpc SummaryDocument(SummaryDocumentRequest) returns (SummaryDocumentResponse);
  rpc Translation(TranslationRequest) returns (TranslationResponse);
  rpc Quizz(QuizzRequest) returns (QuizzResponse);
  rpc GenerateFlashcard(GenerateFlashcardRequest) returns (GenerateFlashcardResponse);
}

message FileRequest {
    string originalname = 1;
    bytes buffer = 2;
    string mimetype = 3;
    string fieldname=4;
    string encoding=5;
    int64 size=6;
}

message ModerationRequest {
    string text = 1;
    string userId = 2;
}

message ModerationResponse {
    string message = 1;
    int32 statusCode = 2;
    string reasonStatusCode = 3;
    ModerationMetadata metadata = 4;
}


message ModerationMetadata {
  // any
}

message SearchRequest {
  string query = 1;
  string userId = 2;
  int32 limit = 3;
  string roomId = 4;
}

message SearchResponse {
  repeated SearchResult results = 1;
}

message SearchResult {
  string text = 1;
  string contextId = 2;
  double score = 3;
  string messageId = 4;
}

message SuggestRepliesRequest {
  repeated string contextMessages = 1; // List of last N messages
  string userId = 2;
}

message SuggestRepliesResponse {
  repeated string suggestions = 1;
  repeated string emojis = 2;
  repeated string gif_keywords = 3;
}

message SearchMessagesRequest {
  string text = 1;
  string roomId = 2;
  int32 limit = 3;
}

message SearchMessagesResponse {
  repeated SearchResult results = 1;
}

message SummaryDocumentRequest {
  bytes file = 1;
  string filename = 2;
  string mimetype = 3;
}

message SummaryDocumentResponse {
  string message = 1;
  int32 statusCode = 2;
  string reasonStatusCode = 3;
  string metadata = 4;
}

message TranslationRequest {
  string text = 1;
  string from = 2;
  string to = 3;
}

message TranslationResponse {
  string message = 1;
  int32 statusCode = 2;
  string reasonStatusCode = 3;
  string metadata = 4;
}

message QuizzRequest {
  FileRequest file = 1;
  string text = 2;
  string type = 3; // text, document
  string question_type = 4; // single_choice, multiple_choice, true_false, text
  int32 question_max = 5;
  int32 question_max_points = 6;
}

message QuizzResponse {
  string message = 1;
  int32 statusCode = 2;
  string reasonStatusCode = 3;
  QuizzMetadata metadata = 4;
}

message QuizzMetadata {
  string quiz_title = 1;
  string quiz_description = 2;
  string quiz_status = 3; // draft, active, completed, cancelled
  repeated QuizzQuestion quiz_questions = 4;
}

message QuizzQuestion {
  string question_text = 1;
  string question_type = 2; // single_choice, multiple_choice, true_false, text
  int32 points = 3;
  int32 order = 4;
  string explanation = 5;
  repeated QuizzAnswer answers = 6;
}

message QuizzAnswer {
  string answer_text = 1;
  bool is_correct = 2;
  int32 points = 3;
}

message GenerateFlashcardRequest {
  string topic = 1;
  string type = 2; // text, document, file_url
  int32 card_count = 3;
  int32 difficulty = 4;
  string language = 5;
  FileRequest file = 6;
}

message GeneratedFlashcard {
  string card_front = 1;
  string card_back = 2;
  string card_hint = 3;
  repeated string card_tags = 4;
  int32 card_difficulty = 5;
}

message GenerateFlashcardMetadata {
  string deck_name = 1;
  string deck_description = 2;
  string deck_level = 3;
  string deck_language = 4;
  repeated string deck_tags = 5;
  repeated GeneratedFlashcard flashcards = 6;
}

message GenerateFlashcardResponse {
  string message = 1;
  int32 statusCode = 2;
  string reasonStatusCode = 3;
  GenerateFlashcardMetadata metadata = 4;
}

