steps:
  # Build Notification service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'asia-southeast1-docker.pkg.dev/app-chat-2b616/microservices/notification:latest',
        '-f',
        'apps/notification/Dockerfile',
        '.'
      ]

  # Push Notification service image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-southeast1-docker.pkg.dev/app-chat-2b616/microservices/notification:latest']

  # Deploy Notification service to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'  
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        'notification-service',
        '--image','asia-southeast1-docker.pkg.dev/app-chat-2b616/microservices/notification:latest',
        '--region','asia-southeast1',
        '--platform','managed',
        '--use-http2',
        '--min-instances=0',
        '--max-instances=3',
        '--memory=256Mi',
        '--cpu=1',
        '--allow-unauthenticated',
        '--set-env-vars', 'NODE_ENV=${NODE_ENV}',
        '--set-env-vars', 'HOST=${HOST}',
        '--set-env-vars', 'PROTO_PATH=${PROTO_PATH}',
        '--set-env-vars', 'DB_CONNECTION=${DB_CONNECTION}',
        '--set-env-vars', 'DB_HOST=${DB_HOST}',
        '--set-env-vars', 'DB_NAME=${DB_NAME}',
        '--set-env-vars', 'DB_USER=${DB_USER}',
        '--set-env-vars', 'DB_PASSWORD=${DB_PASSWORD}'
      ]

images:
  - 'asia-southeast1-docker.pkg.dev/app-chat-2b616/microservices/notification:latest'
