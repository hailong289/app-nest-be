# Docker Compose Override for Hybrid Mode
# Use this when API Gateway runs in Docker but microservices run locally
# Usage: docker-compose -f docker-compose.yml -f docker-compose.hybrid.yml up -d

version: "3.8"

services:
  api-gateway:
    env_file:
      - apps/api-gateway/.env.hybrid
    depends_on:
      - redpanda
    # Remove dependencies on services that run locally
    # depends_on:
    #   - auth
    #   - chat
    #   - filesystem
    #   - notification

  # Don't start these services if running locally
  auth:
    profiles:
      - full

  chat:
    profiles:
      - full

  filesystem:
    profiles:
      - full

  notification:
    profiles:
      - full

  ai:
    profiles:
      - full
