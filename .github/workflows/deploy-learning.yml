name: Deploy Learning Service

on:
  workflow_call:

jobs:
  deploy:
    name: Deploy Learning to Cloud Run
    runs-on: ubuntu-latest
    environment:
      name: LEARNING_SERVICE
    steps:
      - uses: actions/checkout@v3
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: project-3a90e7bd-fcfe-474a-a03
      - run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build and Push Container
        run: |
          IMAGE="asia-southeast1-docker.pkg.dev/project-3a90e7bd-fcfe-474a-a03/microservices/learning:latest"
          docker build -t $IMAGE -f apps/learning/Dockerfile .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: learning-service
          image: asia-southeast1-docker.pkg.dev/project-3a90e7bd-fcfe-474a-a03/microservices/learning:latest
          region: asia-southeast1
          flags: '--allow-unauthenticated --min-instances=0 --max-instances=10 --cpu=1 --memory=4Gi --port=8080 --timeout=60s --concurrency=1000 --use-http2'
          env_vars: |-
            NODE_ENV=${{ secrets.NODE_ENV }}
            HOST=${{ secrets.HOST }}
            PROTO_URL=${{ secrets.PROTO_URL }}
            DB_CONNECTION=${{ secrets.DB_CONNECTION }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
