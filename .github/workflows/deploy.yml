name: Deploy Microservices

on:
  push:
    branches:
      - master
    paths:
      - 'apps/auth/**'
      - 'apps/api-gateway/**'
      - 'apps/notification/**'
      - 'apps/filesystem/**'
      - 'apps/chat/**'
      - 'apps/chat-storage/**'
      - 'apps/ai/**'
      - 'apps/socket/**'
      - 'apps/learning/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      service-auth: ${{steps.filter.outputs.service-auth }}
      service-api-gateway: ${{ steps.filter.outputs.service-api-gateway }}
      service-noti: ${{ steps.filter.outputs.service-noti }}
      service-filesystem: ${{ steps.filter.outputs.service-filesystem }}
      service-chat: ${{ steps.filter.outputs.service-chat }}
      service-chat-storage: ${{ steps.filter.outputs.service-chat-storage }}
      service-ai: ${{ steps.filter.outputs.service-ai }}
      service-socket: ${{ steps.filter.outputs.service-socket }}
      service-learning: ${{ steps.filter.outputs.service-learning }}
      service-sfu: ${{ steps.filter.outputs.service-sfu }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Detect changed services
        uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          # Mỗi key (service-api-gateway, service-auth) sẽ trở thành một output (true/false)
          filters: |
            service-api-gateway:
              - 'apps/api-gateway/**'
            service-auth:
              - 'apps/auth/**'
            service-noti:
              - 'apps/notification/**'
            service-filesystem:
              - 'apps/filesystem/**'
            service-chat:
              - 'apps/chat/**'
            service-chat-storage:
              - 'apps/chat-storage/**'
            service-ai:
              - 'apps/ai/**'
            service-socket:
              - 'apps/socket/**'
            service-learning:
              - 'apps/learning/**'
            service-sfu:
              - 'apps/sfu/**'

  deploy-auth-service:
    needs:
      - detect-changes
    if: ${{ needs.detect-changes.outputs.service-auth == 'true' }}
    uses: ./.github/workflows/deploy-auth.yml
    secrets: inherit

  deploy-noti-service:
    needs:
      - detect-changes
    if: ${{ needs.detect-changes.outputs.service-noti == 'true' }}
    uses: ./.github/workflows/deploy-noti.yml
    secrets: inherit

  deploy-filesystem-service:
    needs:
      - detect-changes
    if: ${{ needs.detect-changes.outputs.service-filesystem == 'true' }}
    uses: ./.github/workflows/deploy-filesystem.yml
    secrets: inherit
  
  deploy-chat-service:
    needs:
      - detect-changes
    if: ${{ needs.detect-changes.outputs.service-chat == 'true' }}
    uses: ./.github/workflows/deploy-chat.yml
    secrets: inherit

  deploy-chat-storage-service:
    needs:
      - detect-changes
    if: ${{ needs.detect-changes.outputs.service-chat-storage == 'true' }}
    uses: ./.github/workflows/deploy-chat-storage.yml
    secrets: inherit

  deploy-ai-service:
    needs:
      - detect-changes
    if: ${{ needs.detect-changes.outputs.service-ai == 'true' }}
    uses: ./.github/workflows/deploy-ai.yml
    secrets: inherit

  deploy-gateway-service:
    needs:
      - detect-changes
    if: ${{ needs.detect-changes.outputs.service-api-gateway == 'true' }}
    uses: ./.github/workflows/deploy-api-gateway.yml
    secrets: inherit

  deploy-socket-service:
    needs:
      - detect-changes
    if: ${{ needs.detect-changes.outputs.service-socket == 'true' }}
    uses: ./.github/workflows/deploy-socket.yml
    secrets: inherit

  deploy-learning-service:
    needs:
      - detect-changes
    if: ${{ needs.detect-changes.outputs.service-learning == 'true' }}
    uses: ./.github/workflows/deploy-learning.yml
    secrets: inherit

  deploy-sfu-service:
    needs:
      - detect-changes
    if: ${{ needs.detect-changes.outputs.service-sfu == 'true' }}
    uses: ./.github/workflows/deploy-sfu.yml
    secrets: inherit

  notify-services:
    name: Send Deployment Notifications
    runs-on: ubuntu-latest
    needs: 
      [
        detect-changes, 
        deploy-auth-service, 
        deploy-noti-service, 
        deploy-filesystem-service,
        deploy-chat-service,
        deploy-chat-storage-service,
        deploy-gateway-service,
        deploy-socket-service, 
        deploy-learning-service, 
        deploy-ai-service,
        deploy-sfu-service
      ]
    if: always()
    steps:
      - name: Send Discord notifications
        run: |
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGES=()
          
          # Auth Service
          if [ "${{ needs.detect-changes.outputs.service-auth }}" == "true" ]; then
            if [ "${{ needs.deploy-auth-service.result }}" == "success" ]; then
              MESSAGES+=("✅ Auth Service deployment thành công!")
            elif [ "${{ needs.deploy-auth-service.result }}" == "failure" ]; then
              MESSAGES+=("❌ Auth Service deployment thất bại!")
            fi
          fi
          
          # Notification Service
          if [ "${{ needs.detect-changes.outputs.service-noti }}" == "true" ]; then
            if [ "${{ needs.deploy-noti-service.result }}" == "success" ]; then
              MESSAGES+=("✅ Notification Service deployment thành công!")
            elif [ "${{ needs.deploy-noti-service.result }}" == "failure" ]; then
              MESSAGES+=("❌ Notification Service deployment thất bại!")
            fi
          fi
          
          # Filesystem Service
          if [ "${{ needs.detect-changes.outputs.service-filesystem }}" == "true" ]; then
            if [ "${{ needs.deploy-filesystem-service.result }}" == "success" ]; then
              MESSAGES+=("✅ Filesystem Service deployment thành công!")
            elif [ "${{ needs.deploy-filesystem-service.result }}" == "failure" ]; then
              MESSAGES+=("❌ Filesystem Service deployment thất bại!")
            fi
          fi
          
          # Chat Service
          if [ "${{ needs.detect-changes.outputs.service-chat }}" == "true" ]; then
            if [ "${{ needs.deploy-chat-service.result }}" == "success" ]; then
              MESSAGES+=("✅ Chat Service deployment thành công!")
            elif [ "${{ needs.deploy-chat-service.result }}" == "failure" ]; then
              MESSAGES+=("❌ Chat Service deployment thất bại!")
            fi
          fi

          # Chat Storage Service
          if [ "${{ needs.detect-changes.outputs.service-chat-storage }}" == "true" ]; then
            if [ "${{ needs.deploy-chat-storage-service.result }}" == "success" ]; then
              MESSAGES+=("✅ Chat Storage Service deployment thành công!")
            elif [ "${{ needs.deploy-chat-storage-service.result }}" == "failure" ]; then
              MESSAGES+=("❌ Chat Storage Service deployment thất bại!")
            fi
          fi

          # AI Service
          if [ "${{ needs.detect-changes.outputs.service-ai }}" == "true" ]; then
            if [ "${{ needs.deploy-ai-service.result }}" == "success" ]; then
              MESSAGES+=("✅ AI Service deployment thành công!")
            elif [ "${{ needs.deploy-ai-service.result }}" == "failure" ]; then
              MESSAGES+=("❌ AI Service deployment thất bại!")
            fi
          fi

          # Socket Service
          if [ "${{ needs.detect-changes.outputs.service-socket }}" == "true" ]; then
            if [ "${{ needs.deploy-socket-service.result }}" == "success" ]; then
              MESSAGES+=("✅ Socket Service deployment thành công!")
            elif [ "${{ needs.deploy-socket-service.result }}" == "failure" ]; then
              MESSAGES+=("❌ Socket Service deployment thất bại!")
            fi
          fi
          
          # Learning Service
          if [ "${{ needs.detect-changes.outputs.service-learning }}" == "true" ]; then
            if [ "${{ needs.deploy-learning-service.result }}" == "success" ]; then
              MESSAGES+=("✅ Learning Service deployment thành công!")
            elif [ "${{ needs.deploy-learning-service.result }}" == "failure" ]; then
              MESSAGES+=("❌ Learning Service deployment thất bại!")
            fi
          fi

          # SFU Service
          if [ "${{ needs.detect-changes.outputs.service-sfu }}" == "true" ]; then
            if [ "${{ needs.deploy-sfu-service.result }}" == "success" ]; then
              MESSAGES+=("✅ SFU Service deployment thành công!")
            elif [ "${{ needs.deploy-sfu-service.result }}" == "failure" ]; then
              MESSAGES+=("❌ SFU Service deployment thất bại!")
            fi
          fi
          
          # API Gateway Service
          if [ "${{ needs.detect-changes.outputs.service-api-gateway }}" == "true" ]; then
            if [ "${{ needs.deploy-gateway-service.result }}" == "success" ]; then
              MESSAGES+=("✅ API Gateway Service deployment thành công!")
            elif [ "${{ needs.deploy-gateway-service.result }}" == "failure" ]; then
              MESSAGES+=("❌ API Gateway Service deployment thất bại!")
            fi
          fi
          
          # Gộp tất cả messages và gửi
          if [ ${#MESSAGES[@]} -gt 0 ]; then
            MESSAGE=$(IFS=$'\n'; echo "${MESSAGES[*]}")
            MESSAGE="${MESSAGE}"$'\n'"Kiểm tra tại: ${WORKFLOW_URL}"
            
            # Tạo JSON payload an toàn bằng Python
            JSON_PAYLOAD=$(python3 -c "import json, sys; print(json.dumps({'content': sys.stdin.read()}))" <<< "$MESSAGE")
            
            curl --location '${{ secrets.DISCORD_WEBHOOK_URL }}' \
              --header 'Content-Type: application/json' \
              --data "$JSON_PAYLOAD"
          fi
