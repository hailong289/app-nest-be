name: Deploy Services Auth

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Select service to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - api-gateway
          - auth
  push:
    branches:
      - developer
    paths:
      - 'apps/**'

jobs:
   
   # Phát hiện thay đổi trong các thư mục dịch vụ
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      service-a: ${{ steps.filter.outputs.service-a }}
      service-b: ${{ steps.filter.outputs.service-b }}
      service-c: ${{ steps.filter.outputs.service-c }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Detect changed services
        uses: dorny/paths-filter@v3
        id: filter
        with:
          # Mỗi key (service-api-gateway, service-auth) sẽ trở thành một output (true/false)
          filters: |
            service-api-gateway:
              - 'apps/api-gateway/**'
            service-auth:
              - 'apps/auth/**'

  # Deploy API Gateway Service
  deploy-gateway-service:
    # needs: detect-changes tạm thời comment để test
    needs: deploy-auth-service
    # if: needs.detect-changes.outputs.service-api-gateway == 'true'
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.service == 'api-gateway' || github.event.inputs.service == 'all')) ||
      contains(github.event.head_commit.message, 'service/api-gateway')

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: app-chat-2b616

      - name: Configure Docker
        run: gcloud api-gateway configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build & Push Docker image
        run: |
          IMAGE="asia-southeast1-docker.pkg.dev/app-chat-2b616/microservices/api-gateway:latest"
          docker build -t $IMAGE -f apps/api-gateway/Dockerfile .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy api-gateway-service \
            --image asia-southeast1-docker.pkg.dev/app-chat-2b616/microservices/api-gateway:latest \
            --region asia-southeast1 \
            --platform managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3 \
            --cpu=1 \
            --memory=128Mi \
            --use-http2 \
            --set-env-vars NODE_ENV=production \
            --set-env-vars HOST=${{ secrets.GATEWAY_HOST }} \
            --set-env-vars GATEWAY_AUTH_HOST=${{ secrets.GATEWAY_AUTH_HOST }} \
            --set-env-vars GATEWAY_AUTH_DB_CONNECTION=${{ secrets.GATEWAY_AUTH_PORT }} \
            --set-env-vars GATEWAY_AUTH_PROTO_PATH=${{ secrets.GATEWAY_AUTH_PROTO_PATH }} \
            --set-env-vars GATEWAY_AUTH_JWT_ACCESS_SECRET=${{ secrets.GATEWAY_AUTH_JWT_ACCESS_SECRET }} \
            --set-env-vars GATEWAY_AUTH_JWT_REFRESH_SECRET=${{ secrets.GATEWAY_AUTH_JWT_REFRESH_SECRET }}

  # Deploy Auth Service
  deploy-auth-service:
    needs: detect-changes
    if: |
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.service == 'auth' || github.event.inputs.service == 'all')) ||
      needs.detect-changes.outputs.service-auth == 'true'
    runs-on: ubuntu-latest
    # if: contains(github.event.head_commit.message, 'service/auth')

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: app-chat-2b616

      - name: Configure Docker
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build & Push Docker image
        run: |
          IMAGE="asia-southeast1-docker.pkg.dev/app-chat-2b616/microservices/auth:latest"
          docker build -t $IMAGE -f apps/auth/Dockerfile .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy auth-service \
            --image asia-southeast1-docker.pkg.dev/app-chat-2b616/microservices/auth:latest \
            --region asia-southeast1 \
            --platform managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3 \
            --cpu=1 \
            --memory=128Mi \
            --use-http2 \
            --set-env-vars NODE_ENV=production \
            --set-env-vars HOST=${{ secrets.AUTH_HOST }} \
            --set-env-vars PROTO_PATH=${{ secrets.AUTH_PROTO_PATH }} \
            --set-env-vars DB_CONNECTION=${{ secrets.AUTH_DB_CONNECTION }} \
            --set-env-vars DB_HOST=${{ secrets.AUTH_DB_HOST }} \
            --set-env-vars DB_NAME=${{ secrets.AUTH_DB_NAME }} \
            --set-env-vars DB_USER=${{ secrets.AUTH_DB_USER }} \
            --set-env-vars DB_PASSWORD=${{ secrets.AUTH_DB_PASSWORD }} \
            --set-env-vars JWT_ACCESS_SECRET=${{ secrets.AUTH_JWT_ACCESS_SECRET }} \
            --set-env-vars JWT_REFRESH_SECRET=${{ secrets.AUTH_JWT_REFRESH_SECRET }}
  
  