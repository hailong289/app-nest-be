name: Deploy Microservices

on:
  push:
    branches:
      - developer
    paths:
      - 'apps/auth/**'
      - 'apps/api-gateway/**'
      - 'apps/notification/**'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - auth
          - api-gateway
          - notification

      
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      service-auth: ${{steps.filter.outputs.service-auth }}
      service-api-gateway: ${{ steps.filter.outputs.service-api-gateway }}
      service-noti: ${{ steps.filter.outputs.service-noti }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Detect changed services
        uses: dorny/paths-filter@v3
        id: filter
        with:
          # Mỗi key (service-api-gateway, service-auth) sẽ trở thành một output (true/false)
          filters: |
            service-api-gateway:
              - 'apps/api-gateway/**'
            service-auth:
              - 'apps/auth/**'
            service-noti:
              - 'apps/notification/**'

  deploy-auth-service:
    needs: 
      - detect-changes
    if: ${{ needs.detect-changes.outputs.service-auth == 'true' || github.event.inputs.service == 'auth' || github.event.inputs.service == 'all' }}
    uses: ./.github/workflows/deploy-auth.yml
    secrets: inherit

  deploy-noti-service:
    needs: 
      - detect-changes
    if: ${{ needs.detect-changes.outputs.service-noti == 'true' || github.event.inputs.service == 'notification' || github.event.inputs.service == 'all' }}
    uses: ./.github/workflows/deploy-noti.yml
    secrets: inherit

  deploy-gateway-service:
    needs: 
      - detect-changes
      - deploy-auth-service
    if: ${{ needs.detect-changes.outputs.service-api-gateway == 'true' || github.event.inputs.service == 'api-gateway' || github.event.inputs.service == 'all' }}
    uses: ./.github/workflows/deploy-api-gateway.yml
    secrets: inherit
