name: Deploy Microservices

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Select service to deploy"
        required: true
        default: "auth"
        type: choice
        options:
          - auth
          - api-gateway
          - all

  # push:
  #   branches: [developer]
  #   paths:
  #     - 'apps/**'

jobs:
  # detect-changes:
  #   runs-on: ubuntu-latest
  #   outputs:
  #     service-auth: ${{ steps.filter.outputs.service-auth }}
  #     service-api-gateway: ${{ steps.filter.outputs.service-api-gateway }}
  #   steps:
  #     - uses: actions/checkout@v4
  #     - id: filter
  #       uses: dorny/paths-filter@v3
  #       with:
  #         filters: |
  #           service-api-gateway:
  #             - 'apps/api-gateway/**'
  #           service-auth:
  #             - 'apps/auth/**'

  deploy-auth-service:
    # needs: detect-changes
    # if: |
    #   github.event_name == 'workflow_dispatch' && (
    #     github.event.inputs.service == 'auth' ||
    #     github.event.inputs.service == 'all'
    #   ) ||
    #   needs.detect-changes.outputs.service-auth == 'true' ||
    #   contains(github.event.head_commit.message, 'service/auth')
    if: github.event.inputs.service == 'auth' || github.event.inputs.service == 'all'
    uses: ./.github/workflows/deploy-auth.yml
    with:
      environment: AUTH_SERVICE
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
    

  deploy-gateway-service:
    # needs: detect-changes
    # if: |
    #   github.event_name == 'workflow_dispatch' && (
    #     github.event.inputs.service == 'api-gateway' ||
    #     github.event.inputs.service == 'all'
    #   ) ||
    #   needs.detect-changes.outputs.service-api-gateway == 'true' ||
    #   contains(github.event.head_commit.message, 'service/api-gateway')
    if: github.event.inputs.service == 'api-gateway' || github.event.inputs.service == 'all'
    uses: ./.github/workflows/deploy-api-gateway.yml
    with:
      environment: GATEWAY_SERVICE
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
    
