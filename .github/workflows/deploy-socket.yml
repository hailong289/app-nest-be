name: Deploy Socket Service

on:
  workflow_call:

jobs:
  deploy:
    name: Deploy Socket to Cloud Run
    runs-on: ubuntu-latest
    environment:
      name: SOCKET_SERVICE
    steps:
      - uses: actions/checkout@v3
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: project-3a90e7bd-fcfe-474a-a03
      - run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet
      - run: |
          IMAGE="asia-southeast1-docker.pkg.dev/project-3a90e7bd-fcfe-474a-a03/microservices/socket:latest"
          docker build -t $IMAGE -f apps/socket/Dockerfile .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy socket-service \
            --image asia-southeast1-docker.pkg.dev/project-3a90e7bd-fcfe-474a-a03/microservices/socket:latest \
            --region asia-southeast1 \
            --platform managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=40 \
            --cpu=1 \
            --memory=1Gi \
            --port=8080 \
            --timeout=3600s \
            --concurrency=250 \
            --set-env-vars NODE_ENV=${{ secrets.NODE_ENV }} \
            --set-env-vars REDIS_HOST=${{ secrets.REDIS_HOST }} \
            --set-env-vars REDIS_PORT=${{ secrets.REDIS_PORT }} \
            --set-env-vars REDIS_USERNAME=${{ secrets.REDIS_USERNAME }} \
            --set-env-vars REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
            --set-env-vars GATEWAY_JWT_ACCESS_SECRET=${{ secrets.GATEWAY_JWT_ACCESS_SECRET }} \
            --set-env-vars GATEWAY_CHAT_HOST=${{ secrets.GATEWAY_CHAT_HOST }} \
            --set-env-vars GATEWAY_CHAT_PORT=${{ secrets.GATEWAY_CHAT_PORT }} \
            --set-env-vars GATEWAY_CHAT_PROTO_PATH=${{ secrets.GATEWAY_CHAT_PROTO_PATH }} \
            --set-env-vars GATEWAY_FILESYSTEM_HOST=${{ secrets.GATEWAY_FILESYSTEM_HOST }} \
            --set-env-vars GATEWAY_FILESYSTEM_PORT=${{ secrets.GATEWAY_FILESYSTEM_PORT }} \
            --set-env-vars GATEWAY_NOTI_KAFKA_HOST=${{ secrets.GATEWAY_NOTI_KAFKA_HOST }} \
            --set-env-vars GATEWAY_NOTI_KAFKA_PORT=${{ secrets.GATEWAY_NOTI_KAFKA_PORT }} \
            --set-env-vars GATEWAY_NOTI_KAFKA_CLIENT_ID=${{ secrets.GATEWAY_NOTI_KAFKA_CLIENT_ID }} \
            --set-env-vars GATEWAY_NOTI_KAFKA_GROUP_ID=${{ secrets.GATEWAY_NOTI_KAFKA_GROUP_ID }} \
            --set-env-vars GATEWAY_NOTI_KAFKA_SASL=${{ secrets.GATEWAY_NOTI_KAFKA_SASL }} \
            --set-env-vars GATEWAY_NOTI_KAFKA_SASL_MECHANISM=${{ secrets.GATEWAY_NOTI_KAFKA_SASL_MECHANISM }} \
            --set-env-vars GATEWAY_NOTI_KAFKA_SASL_USERNAME=${{ secrets.GATEWAY_NOTI_KAFKA_SASL_USERNAME }} \
            --set-env-vars GATEWAY_NOTI_KAFKA_SASL_PASSWORD=${{ secrets.GATEWAY_NOTI_KAFKA_SASL_PASSWORD }} \
            --set-env-vars GATEWAY_SFU_HOST=${{ secrets.GATEWAY_SFU_HOST }} \
            --set-env-vars GATEWAY_SFU_PORT=${{ secrets.GATEWAY_SFU_PORT }} \
            --set-env-vars GATEWAY_SFU_TLS=${{ secrets.GATEWAY_SFU_TLS }} \
            --set-env-vars GATEWAY_SFU_PROTO_PATH=${{ secrets.GATEWAY_SFU_PROTO_PATH }} \
            --set-env-vars SFU_INTERNAL_SECRET=${{ secrets.SFU_INTERNAL_SECRET }} \
            --set-env-vars GATEWAY_AI_HOST=${{ secrets.GATEWAY_AI_HOST }} \
            --set-env-vars GATEWAY_AI_PORT=${{ secrets.GATEWAY_AI_PORT }} \
            --set-env-vars GATEWAY_AI_PROTO_PATH=${{ secrets.GATEWAY_AI_PROTO_PATH }} \
            --set-env-vars CHAT_INGEST_MODE=grpc \
            --set-env-vars KAFKA_AUTO_CREATE_TOPICS=true \
            --set-env-vars KAFKA_HOST=${{ secrets.KAFKA_HOST }} \
            --set-env-vars KAFKA_PORT=${{ secrets.KAFKA_PORT }} \
            --set-env-vars KAFKA_SASL=${{ secrets.KAFKA_SASL }} \
            --set-env-vars KAFKA_SASL_USERNAME=${{ secrets.KAFKA_SASL_USERNAME }} \
            --set-env-vars KAFKA_SASL_PASSWORD=${{ secrets.KAFKA_SASL_PASSWORD }} \
            --set-env-vars KAFKA_SASL_MECHANISM=${{ secrets.KAFKA_SASL_MECHANISM }}
