name: Deploy Chat Storage Service

on:
  workflow_call:

jobs:
  deploy:
    name: Deploy Chat Storage to Cloud Run
    runs-on: ubuntu-latest
    # Tái dùng secrets của chat (chung Mongo/Kafka).
    environment:
      name: CHAT_SERVICE
    steps:
      - uses: actions/checkout@v3
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: project-3a90e7bd-fcfe-474a-a03

      - run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet
      - name: Build and Push Container
        run: |
          IMAGE="asia-southeast1-docker.pkg.dev/project-3a90e7bd-fcfe-474a-a03/microservices/chat-storage:latest"
          docker build -t $IMAGE -f apps/chat-storage/Dockerfile .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: chat-storage-service
          image: asia-southeast1-docker.pkg.dev/project-3a90e7bd-fcfe-474a-a03/microservices/chat-storage:latest
          region: asia-southeast1
          # Consumer nền: min-instances=1 để LUÔN có 1 instance chạy; no-cpu-throttling
          # để CPU được cấp liên tục (Cloud Run KHÔNG auto-scale theo Kafka lag — muốn
          # thêm consumer thì TĂNG min-instances, ≤ số partition). port=8080 = health.
          flags: '--allow-unauthenticated --min-instances=1 --max-instances=6 --no-cpu-throttling --cpu=1 --memory=2Gi --concurrency=1000 --timeout=300s'
          env_vars: |-
            NODE_ENV=${{ secrets.NODE_ENV }}
            DB_CONNECTION=${{ secrets.DB_CONNECTION }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            KAFKA_HOST=${{ secrets.KAFKA_HOST }}
            KAFKA_PORT=${{ secrets.KAFKA_PORT }}
            KAFKA_CLIENT_ID=chat-storage
            KAFKA_GROUP_ID=chat-storage-group
            KAFKA_SASL=${{ secrets.KAFKA_SASL }}
            KAFKA_SASL_USERNAME=${{ secrets.KAFKA_SASL_USERNAME }}
            KAFKA_SASL_PASSWORD=${{ secrets.KAFKA_SASL_PASSWORD }}
            KAFKA_SASL_MECHANISM=${{ secrets.KAFKA_SASL_MECHANISM }}
