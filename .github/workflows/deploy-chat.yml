name: Deploy Chat Service

on:
  workflow_call:

jobs:
  deploy:
    name: Deploy Chat to Cloud Run
    runs-on: ubuntu-latest
    environment:
      name: CHAT_SERVICE
    steps:
      - uses: actions/checkout@v3
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: project-3a90e7bd-fcfe-474a-a03

      - run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet
      - name: Build and Push Container
        run: |
          IMAGE="asia-southeast1-docker.pkg.dev/project-3a90e7bd-fcfe-474a-a03/microservices/chat:latest"
          docker build -t $IMAGE -f apps/chat/Dockerfile .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: chat-service
          image: asia-southeast1-docker.pkg.dev/project-3a90e7bd-fcfe-474a-a03/microservices/chat:latest
          region: asia-southeast1
          # min-instances=1 + --no-cpu-throttling: consumer eachBatch chat.inbound
          # LUÔN ấm (như local dev:all) → KHÔNG cold-start, KHÔNG join lại consumer
          # group mỗi lần → độ trễ giao tin thấp & ổn định. Đổi từ min=0 (cost-
          # optimized nhưng cold-start ~vài giây + nguy cơ consumer ngủ làm tin
          # kẹt) sang min=1 vì ưu tiên ĐỘ TRỄ như local. Cost: ~1 instance always-on.
          flags: '--allow-unauthenticated --min-instances=1 --max-instances=10 --cpu=1 --memory=4Gi --port=8080 --timeout=60s --concurrency=1000 --use-http2 --no-cpu-throttling'
          env_vars: |-
            NODE_ENV=${{ secrets.NODE_ENV }}
            HOST=${{ secrets.HOST }}
            PROTO_PATH=${{ secrets.PROTO_PATH }}
            DB_CONNECTION=${{ secrets.DB_CONNECTION }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            REDIS_USERNAME=${{ secrets.REDIS_USERNAME }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} 
            KAFKA_HOST=${{ secrets.KAFKA_HOST }}
            KAFKA_PORT=${{ secrets.KAFKA_PORT }}
            KAFKA_CLIENT_ID=${{ secrets.KAFKA_CLIENT_ID }}
            KAFKA_GROUP_ID=${{ secrets.KAFKA_GROUP_ID }}
            KAFKA_SASL=${{ secrets.KAFKA_SASL }}
            KAFKA_SASL_USERNAME=${{ secrets.KAFKA_SASL_USERNAME }}
            KAFKA_SASL_PASSWORD=${{ secrets.KAFKA_SASL_PASSWORD }}
            KAFKA_SASL_MECHANISM=${{ secrets.KAFKA_SASL_MECHANISM }}
            CHAT_INGEST_MODE=grpc
            KAFKA_AUTO_CREATE_TOPICS=true
