name: Deploy Chat Service

on:
  workflow_call:

jobs:
  deploy:
    name: Deploy Chat to Cloud Run
    runs-on: ubuntu-latest
    environment: 
      name: AUTH_SERVICE
    steps:
      - uses: actions/checkout@v3
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: app-chat-2b616
      - run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet
      - run: |
          IMAGE="asia-southeast1-docker.pkg.dev/app-chat-2b616/microservices/chat:latest"
          docker build -t $IMAGE -f apps/chat/Dockerfile .
          docker push $IMAGE
      - run: |
          gcloud run deploy chat-service \
            --image asia-southeast1-docker.pkg.dev/app-chat-2b616/microservices/chat:latest \
            --region asia-southeast1 \
            --platform managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3 \
            --cpu=1 \
            --memory=512Mi \
            --port=8080 \
            --timeout=60s \
            --use-http2 \
            --set-env-vars NODE_ENV=${{ secrets.NODE_ENV }} \
            --set-env-vars HOST=${{ secrets.HOST }} \
            --set-env-vars PROTO_PATH=${{ secrets.PROTO_PATH }} \
            --set-env-vars DB_CONNECTION=${{ secrets.DB_CONNECTION }} \
            --set-env-vars DB_HOST=${{ secrets.DB_HOST }} \
            --set-env-vars DB_NAME=${{ secrets.DB_NAME }} \
            --set-env-vars DB_USER=${{ secrets.DB_USER }} \
            --set-env-vars DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --set-env-vars REDIS_HOST=${{ secrets.REDIS_HOST }} \
            --set-env-vars REDIS_PORT=${{ secrets.REDIS_PORT }} \
            --set-env-vars REDIS_USERNAME=${{ secrets.REDIS_USERNAME }} \
            --set-env-vars REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} 
