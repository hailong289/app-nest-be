  #   depends_on:
  #     - mongodb
  #   restart: unless-stopped

  # Redis Cache & Session Store
  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Redis Commander (Web UI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    ports:
      - "8082:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379:0:redis123
      - HTTP_USER=admin
      - HTTP_PASSWORD=admin123
    depends_on:
      - redis
    restart: unless-stopped

  # services api gateway and microservices
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - "5000:5000" # host dùng localhost:5000

    env_file:
      - apps/api-gateway/.env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - auth
      - chat
      - filesystem
      - notification

  # service auth microservice
  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    ports:
      - "5001:5001"
    env_file:
      - apps/auth/.env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # service chat microservice
  chat:
    build:
      context: .
      dockerfile: apps/chat/Dockerfile
    ports:
      - "5003:5003"
    env_file:
      - apps/chat/.env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # service filesystem microservice
  filesystem:
    build:
      context: .
      dockerfile: apps/filesystem/Dockerfile
    ports:
      - "5002:5002"
    env_file:
      - apps/filesystem/.env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # service notification microservice
  notification:
    build:
      context: .
      dockerfile: apps/notification/Dockerfile
    ports:
      - "5005:5005"
    env_file:
      - apps/notification/.env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # service ai microservice
  ai:
    build:
      context: .
      dockerfile: apps/ai/Dockerfile
    ports:
      - "5006:5006"
    env_file:
      - apps/ai/.env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  kafka_data:
  # mongodb_data:
  # redis_data:
