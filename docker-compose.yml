name: "nestjs-microservices-kafka-appchat"
services:
  # redpanda:
  #   image: redpandadata/redpanda:v23.2.9
  #   container_name: redpanda
  #   ports:
  #     - "9092:9092"
  #     - "29092:29092"
  #   command:
  #     - redpanda
  #     - start
  #     - --smp
  #     - "1"
  #     - --reserve-memory
  #     - 0M
  #     - --overprovisioned
  #     - --node-id
  #     - "0"
  #     - --kafka-addr
  #     - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
  #     - --advertise-kafka-addr
  #     - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
  #     - --set
  #     - redpanda.auto_create_topics_enabled=true

  # kafka-ui:
  #   image: provectuslabs/kafka-ui:latest
  #   container_name: kafka-ui
  #   ports:
  #     - "8084:8080"
  #   environment:
  #     - KAFKA_CLUSTERS_0_NAME=local
  #     - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=redpanda:29092 # Sửa từ "redpand" thành "redpanda"
  #   depends_on:
  #     - redpanda

  # MongoDB Databases for Microservices
  mongodb-auth:
    image: mongo:7.0
    container_name: mongodb-auth
    ports:
      - "27017:27017"
    volumes:
      - mongodb_auth_data:/data/db
    restart: unless-stopped

  mongodb-chat:
    image: mongo:7.0
    container_name: mongodb-chat
    ports:
      - "27018:27017"
    volumes:
      - mongodb_chat_data:/data/db
    restart: unless-stopped

  mongodb-filesystem:
    image: mongo:7.0
    container_name: mongodb-filesystem
    ports:
      - "27019:27017"
    volumes:
      - mongodb_filesystem_data:/data/db
    restart: unless-stopped

  mongodb-notification:
    image: mongo:7.0
    container_name: mongodb-notification
    ports:
      - "27020:27017"
    volumes:
      - mongodb_notification_data:/data/db
    restart: unless-stopped

  mongodb-ai:
    image: mongo:7.0
    container_name: mongodb-ai
    ports:
      - "27021:27017"
    volumes:
      - mongodb_ai_data:/data/db
    restart: unless-stopped

  mongodb-learning:
    image: mongo:7.0
    container_name: mongodb-learning
    ports:
      - "27022:27017"
    volumes:
      - mongodb_learning_data:/data/db
    restart: unless-stopped

  # # MongoDB Express (Web UI)
  # mongo-express:
  #   image: mongo-express:1.0.2
  #   container_name: mongo-express
  #   ports:
  #     - "8081:8081"
  #   environment:
  #     - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
  #     - ME_CONFIG_MONGODB_ADMINPASSWORD=password123
  #     - ME_CONFIG_MONGODB_SERVER=mongodb
  #     - ME_CONFIG_MONGODB_PORT=27017
  #     - ME_CONFIG_BASICAUTH_USERNAME=admin
  #     - ME_CONFIG_BASICAUTH_PASSWORD=admin123
  #   depends_on:
  #     - mongodb
  #   restart: unless-stopped

  # Redis Cache & Session Store
  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Redis Commander (Web UI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    ports:
      - "8082:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379:0:redis123
      - HTTP_USER=admin
      - HTTP_PASSWORD=admin123
    depends_on:
      - redis
    restart: unless-stopped

  # services api gateway and microservices
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - "5000:5000" # host dùng localhost:5000

    env_file:
      - apps/api-gateway/.env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - auth
      - chat
      - filesystem
      - notification

  # service auth microservice
  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    ports:
      - "5001:5001"
    env_file:
      - apps/auth/.env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # service chat microservice
  chat:
    build:
      context: .
      dockerfile: apps/chat/Dockerfile
    ports:
      - "5003:5003"
    env_file:
      - apps/chat/.env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # service filesystem microservice
  filesystem:
    build:
      context: .
      dockerfile: apps/filesystem/Dockerfile
    ports:
      - "5002:5002"
    env_file:
      - apps/filesystem/.env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # service notification microservice
  notification:
    build:
      context: .
      dockerfile: apps/notification/Dockerfile
    ports:
      - "5005:5005"
    env_file:
      - apps/notification/.env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # service ai microservice
  ai:
    build:
      context: .
      dockerfile: apps/ai/Dockerfile
    ports:
      - "5006:5006"
    env_file:
      - apps/ai/.env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  kafka_data:
  redis_data:
  mongodb_auth_data:
  mongodb_chat_data:
  mongodb_filesystem_data:
  mongodb_notification_data:
  mongodb_ai_data:
  mongodb_learning_data: